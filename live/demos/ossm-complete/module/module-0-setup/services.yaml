apiVersion: v1
kind: Service
metadata:
  name: details
  namespace: bookinfo
  labels:
    app: details
    service: details
    istio.io/use-waypoint: bookinfo-waypoint
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: details
