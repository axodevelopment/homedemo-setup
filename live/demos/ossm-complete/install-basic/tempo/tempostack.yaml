apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: tempo
  namespace: tempo
spec:
  storage:
    secret:
      name: minio-tempo-secret
      type: s3
  storageSize: 5Gi
  resources:
    total:
      limits:
        memory: 2Gi
        cpu: 2000m
  # for now i'll keep this disabled see readme.md
  networkPolicy:
    enabled: false
  tenants:
    mode: openshift
    authentication:
    - tenantName: dev
      tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"
    - tenantName: prod
      tenantId: "1610b0c3-c509-4592-a256-a1871353dbfb"

  template:
    gateway:
      enabled: true

    queryFrontend:
      jaegerQuery:
        enabled: true