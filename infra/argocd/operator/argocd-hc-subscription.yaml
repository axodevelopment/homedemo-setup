### What This Does

# TODO: a Health Check for subscription
# - InProgress
# The goal is to ignnore UpgradePending scenarios which keep things spinning

#Logic 
#      Fairly straight forward checks below

# NOTES  tso far this seems to work 


 resourceHealthChecks:
  - group: operators.coreos.com
    kind: Subscription
    check: |
      hs = {}
      hs.status = "Healthy"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.state == "AtLatestKnown" then
          hs.status = "Healthy"
          hs.message = obj.status.currentCSV .. " installed"
        elseif obj.status.state == "UpgradePending" then
          hs.status = "Healthy"
          hs.message = "UpgradePending — awaiting InstallPlan approval"
        elseif obj.status.state == "UpgradeFailed" then
          hs.status = "Degraded"
          hs.message = "Subscription upgrade failed"
        else
          hs.status = "Progressing"
          hs.message = tostring(obj.status.state)
        end
      end
      return hs